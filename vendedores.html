<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendedores - Pedido movil</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/styles.css?v=20260713-estilo1">
  <link rel="stylesheet" href="css/vendedores-mobile.css?v=20260713-estilo1">
</head>
<body class="vendedores-mobile">
  <section id="vendedorLogin" class="vendedores-login vendedores-oculto" aria-labelledby="vendedorLoginTitulo">
    <form id="vendedorLoginForm" class="vendedores-login-card">
      <p class="vendedores-etiqueta">Ventas moviles</p>
      <h1 id="vendedorLoginTitulo">Ingresar</h1>
      <label>
        Usuario
        <input id="vendedorLoginEmail" type="text" autocomplete="username" placeholder="Nombre o email">
      </label>
      <label>
        Clave
        <input id="vendedorLoginPassword" type="password" autocomplete="current-password" placeholder="Clave">
      </label>
      <button type="submit" class="vendedores-principal">Entrar</button>
      <p id="vendedorLoginEstado" class="vendedores-login-estado">Usa tu usuario de vendedor y clave.</p>
    </form>
  </section>

  <main id="vendedorContenido" class="vendedores-layout vendedores-oculto">
    <header class="vendedores-encabezado">
      <div>
        <p class="vendedores-etiqueta">Ventas moviles</p>
        <h1>Vendedor</h1>
      </div>
      <div class="vendedores-sesion">
        <span id="vendedorEstadoConexion" class="vendedores-estado">Cargando...</span>
        <button id="vendedorBotonSalir" type="button" class="vendedores-salir">Salir</button>
      </div>
    </header>

    <section id="vendedorInicio" class="vendedores-panel vendedores-inicio">
      <div>
        <p class="vendedores-etiqueta">Trabajo de calle</p>
        <h2>Elegir tarea</h2>
      </div>
      <div class="vendedores-modulos">
        <button id="vendedorModuloVenta" type="button" class="vendedores-modulo-card" data-vendedor-modulo="venta">
          <strong>Venta</strong>
          <span>Cliente y pedido</span>
        </button>
        <button id="vendedorModuloClientes" type="button" class="vendedores-modulo-card" data-vendedor-modulo="clientes">
          <strong>Clientes</strong>
          <span>Deuda y cobranza</span>
        </button>
      </div>
    </section>

    <section id="vendedorSeccionClientes" class="vendedores-panel vendedores-datos vendedores-oculto">
      <div class="vendedores-flujo-cabecera">
        <p id="vendedorFlujoPaso" class="vendedores-etiqueta">Paso 1</p>
        <h2 id="vendedorFlujoTitulo">Buscar cliente</h2>
      </div>
      <label>
        Vendedor
        <input id="vendedorNombre" type="text" autocomplete="name" placeholder="Nombre del vendedor">
      </label>
      <label class="vendedores-oculto">
        Zona
        <select id="vendedorZonaCliente">
          <option value="">Seleccionar zona</option>
        </select>
      </label>
      <label>
        Cliente
        <input id="vendedorBusquedaCliente" type="search" placeholder="Codigo o nombre del cliente">
      </label>
      <div id="vendedorResultadosClientes" class="vendedores-resultados"></div>
      <div id="vendedorClienteSeleccionado" class="vendedores-seleccion">Sin cliente seleccionado</div>
      <div class="vendedores-acciones vendedores-acciones-cliente">
        <button id="vendedorBotonEnviarCatalogo" type="button" class="vendedores-secundario">Enviar catalogo</button>
      </div>
    </section>

    <section id="vendedorSeccionProductos" class="vendedores-panel vendedores-oculto">
      <label>
        Producto
        <input id="vendedorBusquedaProducto" type="search" placeholder="Codigo, producto, marca o rubro">
      </label>
      <div id="vendedorResultadosProductos" class="vendedores-productos"></div>
    </section>

    <section id="vendedorSeccionPedido" class="vendedores-panel vendedores-resumen vendedores-oculto">
      <div class="vendedores-resumen-titulo">
        <div>
          <h2>Pedido</h2>
          <div class="vendedores-metricas">
            <span><strong id="vendedorCantidadItems">0</strong> productos</span>
            <span><strong id="vendedorCantidadUnidades">0</strong> unidades</span>
          </div>
        </div>
        <strong id="vendedorTotalPedido">$0</strong>
      </div>
      <div id="vendedorItemsPedido" class="vendedores-items"></div>

      <label>
        Forma de pago
        <select id="vendedorFormaPago">
          <option value="CUENTA_CORRIENTE">Cuenta corriente</option>
          <option value="EFECTIVO">Contado</option>
          <option value="TRANSFERENCIA">Transferencia</option>
        </select>
      </label>
      <label>
        WhatsApp de la distribuidora
        <input id="vendedorTelefonoDestino" type="tel" inputmode="tel" placeholder="Ej: 5491123456789">
      </label>
      <label>
        Observacion
        <textarea id="vendedorObservacion" rows="3" placeholder="Falta mercaderia, horario, cobranza, etc."></textarea>
      </label>

      <div class="vendedores-acciones">
        <button id="vendedorBotonLimpiar" type="button" class="vendedores-secundario">Limpiar</button>
        <button id="vendedorBotonCopiar" type="button" class="vendedores-secundario">Copiar</button>
        <button id="vendedorBotonWhatsapp" type="button" class="vendedores-principal">Guardar y WhatsApp</button>
      </div>
      <p id="vendedorEstadoEnvio" class="vendedores-envio-estado"></p>
    </section>

    <section id="vendedorSeccionCobranza" class="vendedores-panel vendedores-cobranza vendedores-oculto">
      <div class="vendedores-resumen-titulo">
        <div>
          <h2>Cobranza</h2>
          <p id="vendedorCobranzaCliente" class="vendedores-texto-ayuda">Elegi un cliente para ver su saldo.</p>
        </div>
        <strong id="vendedorCobranzaSaldo">$0</strong>
      </div>

      <label>
        Importe cobrado
        <input id="vendedorCobranzaImporte" type="number" min="0" step="0.01" inputmode="decimal" placeholder="0">
      </label>

      <label>
        Medio de pago
        <select id="vendedorCobranzaMedio">
          <option value="EFECTIVO">Efectivo</option>
          <option value="TRANSFERENCIA">Transferencia</option>
          <option value="CHEQUE">Cheque</option>
          <option value="MERCADO_PAGO">Mercado Pago</option>
        </select>
      </label>

      <label>
        Comprobante
        <input id="vendedorCobranzaComprobante" type="text" placeholder="Nro, alias, banco o detalle">
      </label>

      <label>
        Observacion
        <textarea id="vendedorCobranzaObservacion" rows="2" placeholder="Aclaracion de cobranza"></textarea>
      </label>

      <div class="vendedores-acciones">
        <button id="vendedorBotonCobrarSaldo" type="button" class="vendedores-secundario">Total deuda</button>
        <button id="vendedorBotonGuardarCobranza" type="button" class="vendedores-principal">Guardar cobranza</button>
      </div>
      <p id="vendedorCobranzaEstado" class="vendedores-envio-estado"></p>
    </section>
  </main>

  <div id="vendedorBarraPedido" class="vendedores-barra-pedido vendedores-oculto">
    <div>
      <span id="vendedorBarraItems">0 productos</span>
      <strong id="vendedorBarraTotal">$0</strong>
    </div>
    <button id="vendedorBotonBarraWhatsapp" type="button">Enviar pedido</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/productos.js"></script>
  <script src="js/database/supabase-mappers.js"></script>
  <script src="js/database/supabase-repository.js?v=20260713-conectado1"></script>
  <script src="js/supabase-auth.js?v=20260713-loginclave1"></script>
  <script src="js/mobile/vendedores-mobile.js?v=20260713-loginclave1"></script>
</body>
</html>
