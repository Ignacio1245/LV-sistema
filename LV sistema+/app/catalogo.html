<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogo - Distribuidora</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/catalogo.css">
</head>
<body class="catalogo-publico">
  <main class="catalogo-layout">
    <section class="catalogo-panel catalogo-productos-panel" aria-labelledby="catalogoTitulo">
      <header class="catalogo-encabezado">
        <div>
          <p class="catalogo-etiqueta">Distribuidora</p>
          <h1 id="catalogoTitulo">Catalogo para pedidos</h1>
        </div>
        <span id="catalogoEstadoConexion" class="catalogo-estado">Cargando productos...</span>
      </header>

      <div class="catalogo-busqueda">
        <label for="catalogoBusquedaProducto">Buscar producto</label>
        <input id="catalogoBusquedaProducto" type="search" placeholder="Nombre, marca, rubro o codigo">
      </div>

      <div id="catalogoListaProductos" class="catalogo-lista-productos"></div>
    </section>

    <aside class="catalogo-panel catalogo-carrito-panel" aria-labelledby="catalogoCarritoTitulo">
      <header class="catalogo-carrito-encabezado">
        <div>
          <p class="catalogo-etiqueta">Pedido</p>
          <h2 id="catalogoCarritoTitulo">Carrito</h2>
        </div>
        <strong id="catalogoTotalPedido">$0</strong>
      </header>

      <div id="catalogoItemsCarrito" class="catalogo-items-carrito"></div>

      <form id="catalogoFormularioCliente" class="catalogo-formulario">
        <label>
          Nombre del cliente
          <input id="catalogoNombreCliente" type="text" autocomplete="name" placeholder="Ej: Kiosco El Sol">
        </label>
        <label>
          Direccion
          <input id="catalogoDireccionCliente" type="text" autocomplete="street-address" placeholder="Calle, numero y localidad">
        </label>
        <label>
          Telefono de la distribuidora
          <input id="catalogoTelefonoDestino" type="tel" inputmode="tel" placeholder="Ej: 5491123456789">
        </label>
        <label>
          Comentario
          <textarea id="catalogoComentarioCliente" rows="3" placeholder="Horario, forma de pago o aclaracion"></textarea>
        </label>

        <div class="catalogo-acciones">
          <button id="catalogoBotonCopiarPedido" type="button" class="btn-secondary">Copiar pedido</button>
          <button id="catalogoBotonEnviarWhatsapp" type="submit" class="btn-primary">Enviar por WhatsApp</button>
        </div>
      </form>
    </aside>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/productos.js"></script>
  <script src="js/database/supabase-mappers.js"></script>
  <script src="js/database/supabase-repository.js"></script>
  <script src="js/public/catalogo-whatsapp.js"></script>
</body>
</html>
