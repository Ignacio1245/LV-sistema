<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendedores - Pedido movil</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/vendedores-mobile.css">
</head>
<body class="vendedores-mobile">
  <section id="vendedorLogin" class="vendedores-login vendedores-oculto" aria-labelledby="vendedorLoginTitulo">
    <form id="vendedorLoginForm" class="vendedores-login-card">
      <p class="vendedores-etiqueta">Ventas moviles</p>
      <h1 id="vendedorLoginTitulo">Ingresar</h1>
      <label>
        Email
        <input id="vendedorLoginEmail" type="email" autocomplete="email" placeholder="vendedor@empresa.com">
      </label>
      <label>
        Clave
        <input id="vendedorLoginPassword" type="password" autocomplete="current-password" placeholder="Clave de Supabase">
      </label>
      <button type="submit" class="vendedores-principal">Entrar</button>
      <p id="vendedorLoginEstado" class="vendedores-login-estado">Usa el acceso que te dieron en el panel administrativo.</p>
    </form>
  </section>

  <main id="vendedorContenido" class="vendedores-layout vendedores-oculto">
    <header class="vendedores-encabezado">
      <div>
        <p class="vendedores-etiqueta">Ventas moviles</p>
        <h1>Nuevo pedido</h1>
      </div>
      <div class="vendedores-sesion">
        <span id="vendedorEstadoConexion" class="vendedores-estado">Cargando...</span>
        <button id="vendedorBotonSalir" type="button" class="vendedores-salir">Salir</button>
      </div>
    </header>

    <section class="vendedores-panel vendedores-datos">
      <label>
        Vendedor
        <input id="vendedorNombre" type="text" autocomplete="name" placeholder="Nombre del vendedor">
      </label>
      <label>
        Cliente
        <input id="vendedorBusquedaCliente" type="search" placeholder="Codigo, nombre o direccion">
      </label>
      <div id="vendedorResultadosClientes" class="vendedores-resultados"></div>
      <div id="vendedorClienteSeleccionado" class="vendedores-seleccion">Sin cliente seleccionado</div>
    </section>

    <section class="vendedores-panel">
      <label>
        Producto
        <input id="vendedorBusquedaProducto" type="search" placeholder="Codigo, producto, marca o rubro">
      </label>
      <div id="vendedorResultadosProductos" class="vendedores-productos"></div>
    </section>

    <section class="vendedores-panel vendedores-resumen">
      <div class="vendedores-resumen-titulo">
        <h2>Pedido</h2>
        <strong id="vendedorTotalPedido">$0</strong>
      </div>
      <div id="vendedorItemsPedido" class="vendedores-items"></div>

      <label>
        Forma de pago
        <select id="vendedorFormaPago">
          <option value="CUENTA_CORRIENTE">Cuenta corriente</option>
          <option value="EFECTIVO">Contado</option>
          <option value="TRANSFERENCIA">Transferencia</option>
        </select>
      </label>
      <label>
        WhatsApp de la distribuidora
        <input id="vendedorTelefonoDestino" type="tel" inputmode="tel" placeholder="Ej: 5491123456789">
      </label>
      <label>
        Observacion
        <textarea id="vendedorObservacion" rows="3" placeholder="Falta mercaderia, horario, cobranza, etc."></textarea>
      </label>

      <div class="vendedores-acciones">
        <button id="vendedorBotonLimpiar" type="button" class="vendedores-secundario">Limpiar</button>
        <button id="vendedorBotonCopiar" type="button" class="vendedores-secundario">Copiar</button>
        <button id="vendedorBotonWhatsapp" type="button" class="vendedores-principal">Guardar y WhatsApp</button>
      </div>
      <p id="vendedorEstadoEnvio" class="vendedores-envio-estado"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/data.js"></script>
  <script src="js/helpers.js"></script>
  <script src="js/productos.js"></script>
  <script src="js/database/supabase-mappers.js"></script>
  <script src="js/database/supabase-repository.js"></script>
  <script src="js/supabase-auth.js"></script>
  <script src="js/mobile/vendedores-mobile.js"></script>
</body>
</html>
